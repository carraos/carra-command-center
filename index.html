<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CARRA Command Center</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter, sans-serif;
    }

    body{
      background:#0b1020;
      color:white;
      padding:40px;
    }

    h1{
      font-size:40px;
      margin-bottom:30px;
      font-weight:700;
    }

    h2{
      margin-bottom:20px;
    }

    .card{
      background:#131a2e;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:25px;
      margin-bottom:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    input, select{
      width:100%;
      padding:14px;
      margin-top:10px;
      margin-bottom:20px;
      border:none;
      border-radius:12px;
      background:#1b2440;
      color:white;
      font-size:15px;
      outline:none;
    }

    button{
      background:#3b82f6;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      opacity:0.9;
      transform:translateY(-1px);
    }

    .task{
      background:#18213a;
      border-radius:16px;
      padding:20px;
      margin-top:15px;
      border:1px solid rgba(255,255,255,0.05);
    }

    .task h3{
      margin-bottom:12px;
      font-size:22px;
    }

    .task p{
      margin-bottom:8px;
      color:#d1d5db;
    }

    .priority{
      display:inline-block;
      margin-top:10px;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
    }

    .high{
      background:#ef4444;
    }

    .medium{
      background:#f59e0b;
    }

    .low{
      background:#10b981;
    }

    .completed{
      color:#10b981;
      font-weight:700;
    }

    .task-actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .delete-btn{
      background:#ef4444;
    }

    .complete-btn{
      background:#10b981;
    }

  </style>

</head>

<body>

  <h1>🚀 CARRA Command Center</h1>

  <div class="card">

    <h2>Create Task</h2>

    <input type="text" id="task_name" placeholder="Task Name"/>

    <input type="text" id="assigned_to" placeholder="Assigned To"/>

    <input type="text" id="assigned_phone" placeholder="Phone Number"/>

    <select id="priority">
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <button onclick="createTask()">
      Create Task
    </button>

  </div>

  <div class="card">

    <h2>All Tasks</h2>

    <div id="tasks"></div>

  </div>

  <script>

    async function loadTasks(){

      const res = await fetch('http://localhost:3000/tasks');

      const result = await res.json();

      const tasksDiv = document.getElementById('tasks');

      tasksDiv.innerHTML = '';

      result.data.forEach(task => {

        const priorityClass =
          task.priority === 'High'
          ? 'high'
          : task.priority === 'Medium'
          ? 'medium'
          : 'low';

        tasksDiv.innerHTML += `
          
          <div class="task">

            <h3>${task.task_name}</h3>

            <p><strong>Assigned To:</strong> ${task.assigned_to}</p>

            <p><strong>Phone:</strong> ${task.assigned_phone}</p>

            <p>
              <strong>Status:</strong> 
              <span class="${
                task.status === 'Completed'
                ? 'completed'
                : ''
              }">
                ${task.status}
              </span>
            </p>

            <div class="priority ${priorityClass}">
              ${task.priority}
            </div>

            <div class="task-actions">

              <button 
                class="complete-btn"
                onclick="markCompleted('${task.id}')">
                ✅ Complete
              </button>

              <button 
                class="delete-btn"
                onclick="deleteTask('${task.id}')">
                🗑 Delete
              </button>

            </div>

          </div>

        `;

      });

    }

    async function createTask(){

      const task = {

        task_code: 'TASK-' + Math.floor(Math.random() * 1000),

        task_name: document.getElementById('task_name').value,

        assigned_to: document.getElementById('assigned_to').value,

        assigned_phone: document.getElementById('assigned_phone').value,

        priority: document.getElementById('priority').value,

        status: 'Pending',

        frequency: 'once'

      };

      await fetch('http://localhost:3000/tasks', {

        method:'POST',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify(task)

      });

      document.getElementById('task_name').value = '';
      document.getElementById('assigned_to').value = '';
      document.getElementById('assigned_phone').value = '';

      loadTasks();

    }

    async function markCompleted(id){

      await fetch(`http://localhost:3000/tasks/${id}`, {

        method:'PUT',

        headers:{
          'Content-Type':'application/json'
        },

        body:JSON.stringify({
          status:'Completed'
        })

      });

      loadTasks();

    }

    async function deleteTask(id){

      await fetch(`http://localhost:3000/tasks/${id}`, {

        method:'DELETE'

      });

      loadTasks();

    }

    loadTasks();

  </script>

</body>
</html>
