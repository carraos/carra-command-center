<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CARRA Command Center</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="auth.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{

      background:
      radial-gradient(circle at top left,#1d4ed8 0%,transparent 30%),
      radial-gradient(circle at bottom right,#0f172a 0%,transparent 35%),
      #050816;

      color:white;
      min-height:100vh;
      padding:40px;

    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:35px;
      flex-wrap:wrap;
      gap:20px;
    }

    .logo-section h1{
      font-size:42px;
      font-weight:800;
      letter-spacing:-1px;
    }

    .logo-section p{
      margin-top:8px;
      color:#94a3b8;
      font-size:15px;
    }

    .auth-buttons{
      display:flex;
      gap:10px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .auth-btn{

      padding:12px 18px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-weight:600;
      color:white;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);

    }

    .logout-btn{
      background:#ef4444;
    }

    .stats{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .stat-box{

      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(14px);

      padding:18px 22px;
      border-radius:18px;
      min-width:140px;

    }

    .stat-box h3{
      font-size:28px;
      margin-bottom:5px;
    }

    .stat-box span{
      color:#94a3b8;
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:25px;
    }

    .card{

      background:rgba(19,26,46,0.75);
      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:24px;
      padding:25px;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.35);

    }

    .card h2{
      margin-bottom:22px;
      font-size:24px;
    }

    input,select{

      width:100%;
      padding:16px;
      margin-bottom:18px;

      border:none;
      border-radius:16px;

      background:#111827;
      color:white;

      font-size:15px;
      outline:none;

      border:1px solid transparent;

      transition:0.2s;

    }

    input:focus,
    select:focus{

      border-color:#3b82f6;

      box-shadow:
      0 0 0 4px rgba(59,130,246,0.15);

    }

    .create-btn{

      width:100%;
      padding:16px;

      border:none;
      border-radius:16px;

      background:
      linear-gradient(
      135deg,
      #2563eb,
      #3b82f6
      );

      color:white;
      font-size:15px;
      font-weight:700;

      cursor:pointer;
      transition:0.25s;

    }

    .create-btn:hover{

      transform:translateY(-2px);

      box-shadow:
      0 15px 35px rgba(37,99,235,0.4);

    }

    .tasks-wrapper{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .task{

      background:
      linear-gradient(
      145deg,
      rgba(30,41,59,0.95),
      rgba(15,23,42,0.95)
      );

      border:1px solid rgba(255,255,255,0.06);

      border-radius:22px;
      padding:24px;

      position:relative;
      overflow:hidden;

    }

    .task::before{

      content:'';

      position:absolute;

      top:0;
      left:0;

      width:5px;
      height:100%;

      background:#3b82f6;

    }

    .task-header{
      display:flex;
      justify-content:space-between;
      gap:15px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .task-title{
      font-size:24px;
      font-weight:700;
    }

    .task-code{
      color:#64748b;
      font-size:13px;
      margin-top:5px;
    }

    .task-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      margin-top:20px;
    }

    .info-box{
      background:rgba(255,255,255,0.03);
      border-radius:16px;
      padding:16px;
    }

    .info-label{
      color:#94a3b8;
      font-size:12px;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .info-value{
      font-size:15px;
      font-weight:600;
    }

    .priority{

      display:inline-flex;
      align-items:center;
      justify-content:center;

      padding:8px 14px;

      border-radius:999px;

      font-size:12px;
      font-weight:700;

    }

    .high{
      background:rgba(239,68,68,0.18);
      color:#f87171;
    }

    .medium{
      background:rgba(245,158,11,0.18);
      color:#fbbf24;
    }

    .low{
      background:rgba(16,185,129,0.18);
      color:#34d399;
    }

    .completed{
      color:#10b981;
      font-weight:700;
    }

    .pending{
      color:#f59e0b;
      font-weight:700;
    }

    .task-actions{
      display:flex;
      gap:12px;
      margin-top:24px;
      flex-wrap:wrap;
    }

    .btn{

      border:none;
      border-radius:14px;

      padding:13px 18px;

      font-size:14px;
      font-weight:600;

      cursor:pointer;
      transition:0.2s;

    }

    .complete-btn{
      background:#10b981;
      color:white;
    }

    .delete-btn{
      background:#ef4444;
      color:white;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:0.92;
    }

    .empty-state{
      text-align:center;
      padding:70px 20px;
      color:#94a3b8;
    }

    .loading{
      text-align:center;
      padding:50px;
      color:#94a3b8;
    }

    #auth-modal{

      display:none;
      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background:rgba(0,0,0,0.75);

      backdrop-filter:blur(10px);

      justify-content:center;
      align-items:center;

      z-index:9999;

    }

    .auth-box{

      width:400px;

      background:#131a2e;

      border-radius:24px;

      padding:30px;

      border:1px solid rgba(255,255,255,0.08);

    }

    .auth-box h2{
      margin-bottom:20px;
    }

    @media(max-width:1100px){

      .grid{
        grid-template-columns:1fr;
      }

    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .logo-section h1{
        font-size:34px;
      }

      .task-actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }

    }

  </style>

</head>

<body>

  <div id="auth-modal">

    <div class="auth-box">

      <h2 id="auth-title">
        Login
      </h2>

      <input
        type="email"
        id="login_email"
        placeholder="Email"
      />

      <input
        type="password"
        id="login_password"
        placeholder="Password"
      />

      <input
        type="email"
        id="signup_email"
        placeholder="Signup Email"
        style="display:none;"
      />

      <input
        type="password"
        id="signup_password"
        placeholder="Signup Password"
        style="display:none;"
      />

      <button
        class="create-btn"
        id="login-btn"
        onclick="login()">

        Login

      </button>

      <button
        class="create-btn"
        id="signup-btn"
        onclick="signUp()"
        style="
        margin-top:10px;
        display:none;
        ">

        Create Account

      </button>

      <button
        class="btn delete-btn"
        onclick="closeAuth()"
        style="
        width:100%;
        margin-top:10px;
        ">

        Close

      </button>

    </div>

  </div>

  <div class="container">

    <div class="topbar">

      <div class="logo-section">

        <h1>
          🚀 CARRA Command Center
        </h1>

        <p>
          Premium AI Powered Team Task Management System
        </p>

        <div class="auth-buttons">

          <button
            class="auth-btn"
            onclick="showLogin()">

            Login

          </button>

          <button
            class="auth-btn"
            onclick="showSignup()">

            Signup

          </button>

          <button
            class="auth-btn logout-btn"
            onclick="logout()">

            Logout

          </button>

        </div>

      </div>

      <div class="stats">

        <div class="stat-box">
          <h3 id="totalTasks">0</h3>
          <span>Total Tasks</span>
        </div>

        <div class="stat-box">
          <h3 id="pendingTasks">0</h3>
          <span>Pending</span>
        </div>

        <div class="stat-box">
          <h3 id="completedTasks">0</h3>
          <span>Completed</span>
        </div>

      </div>

    </div>

    <div class="grid">

      <div class="card">

        <h2>Create New Task</h2>

        <input
          type="text"
          id="task_name"
          placeholder="Task Name"
        />

        <input
          type="text"
          id="assigned_to"
          placeholder="Assigned To"
        />

        <input
          type="text"
          id="assigned_phone"
          placeholder="Phone Number"
        />

        <select id="priority">

          <option value="High">
            High Priority
          </option>

          <option value="Medium">
            Medium Priority
          </option>

          <option value="Low">
            Low Priority
          </option>

        </select>

        <button
          class="create-btn"
          onclick="createTask()">

          Create Task

        </button>

      </div>

      <div class="card">

        <h2>All Tasks</h2>

        <div
          id="tasks"
          class="tasks-wrapper">

          <div class="loading">
            Loading Tasks...
          </div>

        </div>

      </div>

    </div>

  </div>

  <script>

    const API_URL =
    'https://carra-command-center.onrender.com';

    function showLogin(){

      document.getElementById('auth-modal')
      .style.display='flex';

      document.getElementById('auth-title')
      .innerText='Login';

      document.getElementById('login_email')
      .style.display='block';

      document.getElementById('login_password')
      .style.display='block';

      document.getElementById('login-btn')
      .style.display='block';

      document.getElementById('signup_email')
      .style.display='none';

      document.getElementById('signup_password')
      .style.display='none';

      document.getElementById('signup-btn')
      .style.display='none';

    }

    function showSignup(){

      document.getElementById('auth-modal')
      .style.display='flex';

      document.getElementById('auth-title')
      .innerText='Create Account';

      document.getElementById('login_email')
      .style.display='none';

      document.getElementById('login_password')
      .style.display='none';

      document.getElementById('login-btn')
      .style.display='none';

      document.getElementById('signup_email')
      .style.display='block';

      document.getElementById('signup_password')
      .style.display='block';

      document.getElementById('signup-btn')
      .style.display='block';

    }

    function closeAuth(){

      document.getElementById('auth-modal')
      .style.display='none';

    }

    async function loadTasks(){

      try{

        const res =
        await fetch(`${API_URL}/tasks`);

        const result =
        await res.json();

        const tasksDiv =
        document.getElementById('tasks');

        tasksDiv.innerHTML='';

        const tasks =
        result.data || [];

        document.getElementById('totalTasks')
        .innerText=tasks.length;

        document.getElementById('pendingTasks')
        .innerText=
        tasks.filter(
          t=>t.status !== 'Completed'
        ).length;

        document.getElementById('completedTasks')
        .innerText=
        tasks.filter(
          t=>t.status === 'Completed'
        ).length;

        if(tasks.length===0){

          tasksDiv.innerHTML=`

            <div class="empty-state">

              <div style="font-size:70px">
                📭
              </div>

              <h3>No Tasks Available</h3>

            </div>

          `;

          return;

        }

        tasks.forEach(task=>{

          const priorityClass=

          task.priority==='High'
          ? 'high'

          : task.priority==='Medium'
          ? 'medium'

          : 'low';

          tasksDiv.innerHTML += `

            <div class="task">

              <div class="task-header">

                <div>

                  <div class="task-title">
                    ${task.task_name}
                  </div>

                  <div class="task-code">
                    ${task.task_code}
                  </div>

                </div>

                <div class="priority ${priorityClass}">
                  ${task.priority}
                </div>

              </div>

              <div class="task-grid">

                <div class="info-box">

                  <div class="info-label">
                    Assigned To
                  </div>

                  <div class="info-value">
                    ${task.assigned_to}
                  </div>

                </div>

                <div class="info-box">

                  <div class="info-label">
                    Phone Number
                  </div>

                  <div class="info-value">
                    ${task.assigned_phone}
                  </div>

                </div>

                <div class="info-box">

                  <div class="info-label">
                    Status
                  </div>

                  <div class="info-value
                  ${task.status==='Completed'
                  ? 'completed'
                  : 'pending'}">

                    ${task.status}

                  </div>

                </div>

              </div>

              <div class="task-actions">

                <button
                  class="btn complete-btn"
                  onclick="markCompleted('${task.id}')">

                  ✅ Complete

                </button>

                <button
                  class="btn delete-btn"
                  onclick="deleteTask('${task.id}')">

                  🗑 Delete

                </button>

              </div>

            </div>

          `;

        });

      }catch(err){

        console.error(err);

      }

    }

    async function createTask(){

      const taskName=
      document.getElementById('task_name').value;

      const assignedTo=
      document.getElementById('assigned_to').value;

      const assignedPhone=
      document.getElementById('assigned_phone').value;

      const priority=
      document.getElementById('priority').value;

      if(
        !taskName ||
        !assignedTo ||
        !assignedPhone
      ){

        alert('Please fill all fields');

        return;

      }

      const task={

        task_code:
        'TASK-'+
        Math.floor(Math.random()*100000),

        task_name:taskName,

        assigned_to:assignedTo,

        assigned_phone:assignedPhone,

        priority:priority,

        status:'Pending',

        frequency:'once'

      };

      try{

        await fetch(`${API_URL}/tasks`,{

          method:'POST',

          headers:{
            'Content-Type':'application/json'
          },

          body:JSON.stringify(task)

        });

        document.getElementById('task_name').value='';

        document.getElementById('assigned_to').value='';

        document.getElementById('assigned_phone').value='';

        loadTasks();

      }catch(err){

        console.error(err);

      }

    }

    async function markCompleted(id){

      try{

        await fetch(`${API_URL}/tasks/${id}`,{

          method:'PUT',

          headers:{
            'Content-Type':'application/json'
          },

          body:JSON.stringify({
            status:'Completed'
          })

        });

        loadTasks();

      }catch(err){

        console.error(err);

      }

    }

    async function deleteTask(id){

      const confirmDelete=
      confirm('Delete this task?');

      if(!confirmDelete) return;

      try{

        await fetch(`${API_URL}/tasks/${id}`,{

          method:'DELETE'

        });

        loadTasks();

      }catch(err){

        console.error(err);

      }

    }

    loadTasks();

  </script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
</body>
</html>
