<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CARRA Command Center</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
radial-gradient(circle at top left,#1d4ed8 0%,transparent 30%),
radial-gradient(circle at bottom right,#0f172a 0%,transparent 35%),
#050816;

color:white;
min-height:100vh;
padding:40px;

}

.container{
max-width:1500px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
flex-wrap:wrap;
gap:20px;
}

.logo-section h1{
font-size:42px;
font-weight:800;
letter-spacing:-1px;
}

.logo-section p{
margin-top:8px;
color:#94a3b8;
font-size:15px;
}

.stats{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.stat-box{

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(14px);

padding:18px 22px;
border-radius:18px;
min-width:140px;

}

.stat-box h3{
font-size:28px;
margin-bottom:5px;
}

.stat-box span{
color:#94a3b8;
font-size:13px;
}

.grid{
display:grid;
grid-template-columns:380px 1fr;
gap:25px;
}

.card{

background:rgba(19,26,46,0.75);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

border-radius:24px;
padding:25px;

box-shadow:
0 10px 40px rgba(0,0,0,0.35);

}

.card h2{
margin-bottom:22px;
font-size:24px;
}

input,select{

width:100%;
padding:16px;
margin-bottom:18px;

border:none;
border-radius:16px;

background:#111827;
color:white;

font-size:15px;
outline:none;

border:1px solid transparent;

transition:0.2s;

}

input:focus,
select:focus{

border-color:#3b82f6;

box-shadow:
0 0 0 4px rgba(59,130,246,0.15);

}

.create-btn{

width:100%;
padding:16px;

border:none;
border-radius:16px;

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:white;
font-size:15px;
font-weight:700;

cursor:pointer;
transition:0.25s;

}

.create-btn:hover{

transform:translateY(-2px);

box-shadow:
0 15px 35px rgba(37,99,235,0.4);

}

.search-box{
margin-bottom:20px;
}

.tasks-wrapper{
display:flex;
flex-direction:column;
gap:18px;
}

.task{

background:
linear-gradient(
145deg,
rgba(30,41,59,0.95),
rgba(15,23,42,0.95)
);

border:1px solid rgba(255,255,255,0.06);

border-radius:22px;
padding:24px;

position:relative;
overflow:hidden;

animation:fadeIn 0.3s ease;

}

.overdue{
border:1px solid #ef4444 !important;
box-shadow:0 0 20px rgba(239,68,68,0.2);
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.task::before{

content:'';

position:absolute;

top:0;
left:0;

width:5px;
height:100%;

background:#3b82f6;

}

.task-header{
display:flex;
justify-content:space-between;
gap:15px;
align-items:flex-start;
flex-wrap:wrap;
margin-bottom:15px;
}

.task-title{
font-size:24px;
font-weight:700;
}

.task-code{
color:#64748b;
font-size:13px;
margin-top:5px;
}

.task-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.info-box{
background:rgba(255,255,255,0.03);
border-radius:16px;
padding:16px;
}

.info-label{
color:#94a3b8;
font-size:12px;
margin-bottom:8px;
text-transform:uppercase;
letter-spacing:1px;
}

.info-value{
font-size:15px;
font-weight:600;
}

.priority{

display:inline-flex;
align-items:center;
justify-content:center;

padding:8px 14px;

border-radius:999px;

font-size:12px;
font-weight:700;

}

.high{
background:rgba(239,68,68,0.18);
color:#f87171;
}

.medium{
background:rgba(245,158,11,0.18);
color:#fbbf24;
}

.low{
background:rgba(16,185,129,0.18);
color:#34d399;
}

.completed{
color:#10b981;
font-weight:700;
}

.pending{
color:#f59e0b;
font-weight:700;
}

.task-actions{
display:flex;
gap:12px;
margin-top:24px;
flex-wrap:wrap;
}

.btn{

border:none;
border-radius:14px;

padding:13px 18px;

font-size:14px;
font-weight:600;

cursor:pointer;

}

.complete-btn{
background:#10b981;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

#authModal{

position:fixed;
inset:0;

background:rgba(2,6,23,0.92);

backdrop-filter:blur(12px);

display:none;

align-items:center;
justify-content:center;

z-index:9999;

padding:20px;

}

.auth-card{

width:100%;
max-width:420px;

background:rgba(15,23,42,0.95);

border:1px solid rgba(255,255,255,0.08);

border-radius:28px;

padding:35px;

}

.auth-card h1{
font-size:34px;
margin-bottom:10px;
}

.auth-card p{
color:#94a3b8;
margin-bottom:25px;
}

.empty-state{
text-align:center;
padding:60px;
color:#94a3b8;
}

.filters{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.filters select{
margin-bottom:0;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

body{
padding:20px;
}

.filters{
flex-direction:column;
}

}

</style>

</head>

<body>

<div id="authModal">

<div class="auth-card">

<h1>🚀 CARRA OS</h1>

<p>
Secure Login Access
</p>

<input
type="email"
id="auth_email"
placeholder="Email Address"
/>

<input
type="password"
id="auth_password"
placeholder="Password"
/>

<button
class="create-btn"
onclick="login()">

Login

</button>

<button
class="create-btn"
style="margin-top:12px"
onclick="signUp()">

Create Account

</button>

</div>

</div>

<div class="container">

<div class="topbar">

<div class="logo-section">

<h1>
🚀 CARRA Command Center
</h1>

<p>
Premium AI Powered Team Task Management System
</p>

</div>

<div class="stats">

<div class="stat-box">
<h3 id="totalTasks">0</h3>
<span>Total Tasks</span>
</div>

<div class="stat-box">
<h3 id="pendingTasks">0</h3>
<span>Pending</span>
</div>

<div class="stat-box">
<h3 id="completedTasks">0</h3>
<span>Completed</span>
</div>

</div>

</div>

<div class="grid">

<div class="card">

<h2>Create New Task</h2>

<input
type="text"
id="task_name"
placeholder="Task Name"
/>

<input
type="text"
id="assigned_to"
placeholder="Assigned To"
/>

<input
type="text"
id="assigned_phone"
placeholder="Phone Number"
/>

<input
type="datetime-local"
id="due_date"
/>

<select id="task_status">

<option value="Pending">
Pending
</option>

<option value="In Progress">
In Progress
</option>

<option value="Waiting">
Waiting
</option>

<option value="Completed">
Completed
</option>

</select>

<select id="priority">

<option value="High">
High Priority
</option>

<option value="Medium">
Medium Priority
</option>

<option value="Low">
Low Priority
</option>

</select>

<button
class="create-btn"
onclick="createTask()">

Create Task

</button>

<button
class="btn delete-btn"
style="
width:100%;
margin-top:15px;
"
onclick="logout()">

Logout

</button>

</div>

<div class="card">

<h2>All Tasks</h2>

<input
type="text"
id="searchTask"
class="search-box"
placeholder="Search Tasks..."
onkeyup="loadTasks()"
/>

<div class="filters">

<select id="filterStatus" onchange="loadTasks()">

<option value="">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="In Progress">
In Progress
</option>

<option value="Waiting">
Waiting
</option>

<option value="Completed">
Completed
</option>

</select>

<select id="filterPriority" onchange="loadTasks()">

<option value="">
All Priority
</option>

<option value="High">
High
</option>

<option value="Medium">
Medium
</option>

<option value="Low">
Low
</option>

</select>

</div>

<div
id="tasks"
class="tasks-wrapper">

</div>

</div>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
'https://xxsmolqcwbvitmryfgfa.supabase.co',
'sb_publishable_ejNWxFkpYXoMrjpL0GZtuQ_PvCd1k5f'
);

// ===========================
// AUTH
// ===========================

async function signUp(){

const email =
document.getElementById('auth_email').value;

const password =
document.getElementById('auth_password').value;

const { error } =
await supabaseClient.auth.signUp({

email,
password

});

if(error){

alert(error.message);
return;

}

alert('Account created successfully');

}

async function login(){

const email =
document.getElementById('auth_email').value;

const password =
document.getElementById('auth_password').value;

const { error } =
await supabaseClient.auth.signInWithPassword({

email,
password

});

if(error){

alert(error.message);
return;

}

document.getElementById('authModal')
.style.display='none';

await loadTasks();

}

async function logout(){

await supabaseClient.auth.signOut();

location.reload();

}

// ===========================
// CHECK USER
// ===========================

async function checkUser(){

const {
data: { user }
} = await supabaseClient.auth.getUser();

if(!user){

document.getElementById('authModal')
.style.display='flex';

}else{

document.getElementById('authModal')
.style.display='none';

await loadTasks();

}

}

// ===========================
// UPDATE STATS
// ===========================

function updateStats(tasks){

document.getElementById('totalTasks')
.innerText=tasks.length;

document.getElementById('pendingTasks')
.innerText=
tasks.filter(
t=>t.task_status !== 'Completed'
).length;

document.getElementById('completedTasks')
.innerText=
tasks.filter(
t=>t.task_status === 'Completed'
).length;

}

// ===========================
// LOAD TASKS
// ===========================

async function loadTasks(){

const {
data: { user }
} = await supabaseClient.auth.getUser();

if(!user) return;

const {
data: tasks,
error
} = await supabaseClient
.from('tasks')
.select('*')
.eq('user_id', user.id)
.order('created_at',{
ascending:false
});

if(error){

console.error(error);
return;

}

let filteredTasks = tasks;

const search =
document.getElementById('searchTask')?.value
.toLowerCase() || '';

const filterStatus =
document.getElementById('filterStatus')?.value || '';

const filterPriority =
document.getElementById('filterPriority')?.value || '';

if(search){

filteredTasks =
filteredTasks.filter(task =>

task.task_name
.toLowerCase()
.includes(search)

);

}

if(filterStatus){

filteredTasks =
filteredTasks.filter(task =>

task.task_status === filterStatus

);

}

if(filterPriority){

filteredTasks =
filteredTasks.filter(task =>

task.priority === filterPriority

);

}

updateStats(filteredTasks);

const tasksDiv =
document.getElementById('tasks');

tasksDiv.innerHTML='';

if(filteredTasks.length===0){

tasksDiv.innerHTML=`

<div class="empty-state">

<h2>
No Tasks Found
</h2>

</div>

`;

return;

}

filteredTasks.forEach(task=>{

const priorityClass=
task.priority==='High'
? 'high'
: task.priority==='Medium'
? 'medium'
: 'low';

const isOverdue =
task.due_date &&
new Date(task.due_date) < new Date() &&
task.task_status !== 'Completed';

tasksDiv.innerHTML += `

<div class="task ${isOverdue ? 'overdue' : ''}">

<div class="task-header">

<div>

<div class="task-title">
${task.task_name}
</div>

<div class="task-code">
${task.task_code}
</div>

</div>

<div class="priority ${priorityClass}">
${task.priority}
</div>

</div>

<div class="task-grid">

<div class="info-box">

<div class="info-label">
Assigned To
</div>

<div class="info-value">
${task.assigned_to}
</div>

</div>

<div class="info-box">

<div class="info-label">
Phone Number
</div>

<div class="info-value">
${task.assigned_phone}
</div>

</div>

<div class="info-box">

<div class="info-label">
Status
</div>

<div class="info-value
${task.task_status==='Completed'
? 'completed'
: 'pending'}">

${task.task_status}

</div>

</div>

<div class="info-box">

<div class="info-label">
Due Date
</div>

<div class="info-value">

${task.due_date
? new Date(task.due_date)
.toLocaleString()
: 'No Due Date'}

</div>

</div>

</div>

<div class="task-actions">

<button
class="btn complete-btn"
onclick="markCompleted('${task.id}')">

✅ Complete

</button>

<button
class="btn delete-btn"
onclick="deleteTask('${task.id}')">

🗑 Delete

</button>

</div>

</div>

`;

});

}

// ===========================
// CREATE TASK
// ===========================

async function createTask(){

const {
data: { user }
} = await supabaseClient.auth.getUser();

if(!user){

alert('Login required');
return;

}

const task={

user_id:user.id,

task_code:
'TASK-'+
Math.floor(Math.random()*100000),

task_name:
document.getElementById('task_name').value,

assigned_to:
document.getElementById('assigned_to').value,

assigned_phone:
document.getElementById('assigned_phone').value,

priority:
document.getElementById('priority').value,

task_status:
document.getElementById('task_status').value,

due_date:
document.getElementById('due_date').value || null,

frequency:'once'

};

const { error } =
await supabaseClient
.from('tasks')
.insert([task]);

if(error){

console.error(error);
alert(error.message);
return;

}

document.getElementById('task_name').value='';
document.getElementById('assigned_to').value='';
document.getElementById('assigned_phone').value='';
document.getElementById('due_date').value='';

await loadTasks();

}

// ===========================
// COMPLETE TASK
// ===========================

async function markCompleted(id){

await supabaseClient
.from('tasks')
.update({
task_status:'Completed'
})
.eq('id',id);

await loadTasks();

}

// ===========================
// DELETE TASK
// ===========================

async function deleteTask(id){

await supabaseClient
.from('tasks')
.delete()
.eq('id',id);

await loadTasks();

}

// ===========================
// INITIALIZE
// ===========================

checkUser();

// ===========================
// REALTIME
// ===========================

supabaseClient
.channel('tasks-db')

.on(
'postgres_changes',
{
event:'*',
schema:'public',
table:'tasks'
},
async () => {

await loadTasks();

}
)

.subscribe();

</script>

</body>
</html>
